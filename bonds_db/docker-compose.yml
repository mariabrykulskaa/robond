services:
  postgres:
    image: postgres:18.3-trixie
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bonds_db
    ports:
      - "5432:5432"
    volumes:
      - bonds_database:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 0.5s
      timeout: 5s
      retries: 30

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/bonds_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  bonds_database:
